# Adversarial scenario: high noise, high multicollinearity, mid-flight budget shift
# Hard case — tests robustness. Expect wider CIs and lower accuracy across all tools.
# The goal here isn't to pick a winner but to see which tools acknowledge uncertainty
# rather than producing confident-but-wrong estimates.

name: adversarial
description: "High noise, 3 highly correlated channels, budget shift at week 60, tests epistemic honesty"
n_weeks: 130
seed: 13
baseline: 80000
trend_slope: -15.0       # slight downward trend (brand decay)
seasonality_amplitude: 0.2
noise_sigma: 8000        # high noise — ~10% of baseline

channels:
  - name: tv
    spend_mean: 100000
    spend_std: 10000     # low variance — spend barely changes (hard to identify)
    adstock_type: delayed
    decay: 0.7
    peak_delay: 3
    alpha: 0.6
    true_coefficient: 0.22

  - name: ooh
    spend_mean: 35000
    spend_std: 4000      # also low variance
    adstock_type: geometric
    decay: 0.55
    alpha: 0.85
    true_coefficient: 0.15
    correlated_with: 0
    correlation: 0.85    # very highly correlated with TV

  - name: paid_search
    spend_mean: 45000
    spend_std: 18000
    adstock_type: geometric
    decay: 0.2
    alpha: 1.3
    true_coefficient: 1.1

  - name: paid_social
    spend_mean: 40000
    spend_std: 16000
    adstock_type: geometric
    decay: 0.3
    alpha: 1.0
    true_coefficient: 0.7
    correlated_with: 2
    correlation: 0.75    # highly correlated with paid_search
